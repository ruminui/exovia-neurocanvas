name: Deploy NeuroCanvas PWA

# Deployment is manual until GitHub Pages is enabled with Source: GitHub Actions.
# This prevents a failed deployment email for every development commit.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify frontend
        run: |
          set -euo pipefail
          for file in src/*.js scripts/*.mjs sw.js; do node --check "$file"; done
          node scripts/verify-frontend.mjs

  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build clean static artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/src
          cp index.html manifest.webmanifest sw.js dist/
          cp src/*.js src/*.css dist/src/
          touch dist/.nojekyll
      - name: Upload static application
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
