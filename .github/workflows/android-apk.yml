name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'src/**'
      - 'examples/**'
      - 'scripts/**'
      - 'tests/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize diagnostics
        run: |
          : > android-build.log
          echo "Android build started for ${GITHUB_SHA}" | tee -a android-build.log

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install locked dependencies
        id: install
        shell: bash
        run: |
          set -euo pipefail
          { npm ci --no-audit --no-fund; npm ls --depth=0; } 2>&1 | tee -a android-build.log

      - name: Verify synchronized lockfile
        id: lockfile
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- package-lock.json | tee -a android-build.log
          echo 'package-lock.json is synchronized and was not modified.' | tee -a android-build.log

      - name: Verify web application
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          { npm run validate; npm run verify:static; npm test; } 2>&1 | tee -a android-build.log

      - name: Build Android web assets
        id: web_assets
        shell: bash
        run: |
          set -euo pipefail
          { npm run build:android:web; test -s dist/index.html; } 2>&1 | tee -a android-build.log

      - name: Generate sync and brand Android project
        id: capacitor
        shell: bash
        run: |
          set -euo pipefail
          {
            if [[ ! -d android ]]; then npx cap add android; fi
            npx cap sync android
            npm run android:brand
            test -f android/gradlew
            test -f android/app/src/main/res/drawable/ic_exovia_foreground.xml
            chmod +x android/gradlew
          } 2>&1 | tee -a android-build.log

      - name: Build installable APK
        id: gradle
        shell: bash
        run: |
          set -euo pipefail
          { cd android; ./gradlew assembleDebug --no-daemon --stacktrace; } 2>&1 | tee -a android-build.log

      - name: Verify and prepare APK
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          {
            source='android/app/build/outputs/apk/debug/app-debug.apk'
            target='Exovia-NeuroCanvas-Android.apk'
            test -s "$source"
            cp "$source" "$target"
            unzip -t "$target"
            sha256sum "$target" > "$target.sha256"
            cat "$target.sha256"
            ls -lh "$target" "$target.sha256"
          } 2>&1 | tee -a android-build.log

      - name: Upload workflow artifact
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: Exovia-NeuroCanvas-Android
          path: |
            Exovia-NeuroCanvas-Android.apk
            Exovia-NeuroCanvas-Android.apk.sha256
            android-build.log
          if-no-files-found: error
          retention-days: 30

      - name: Publish and independently verify release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          {
            build_commit="$(git rev-parse HEAD)"
            git tag -f android-latest "$build_commit"
            git push origin refs/tags/android-latest --force
            if gh release view android-latest >/dev/null 2>&1; then
              gh release upload android-latest Exovia-NeuroCanvas-Android.apk Exovia-NeuroCanvas-Android.apk.sha256 --clobber
              gh release edit android-latest --prerelease --title 'Exovia NeuroCanvas Android - AI Reliability Workspace' --notes "Professional AI Reliability Workspace built from commit $build_commit. Trust Scan, Context Capsule, Safe Router, Proof Pack and SHA-256 verification included."
            else
              gh release create android-latest Exovia-NeuroCanvas-Android.apk Exovia-NeuroCanvas-Android.apk.sha256 --target "$build_commit" --prerelease --title 'Exovia NeuroCanvas Android - AI Reliability Workspace' --notes "Professional AI Reliability Workspace built from commit $build_commit. Trust Scan, Context Capsule, Safe Router, Proof Pack and SHA-256 verification included."
            fi
            rm -rf release-verification && mkdir release-verification
            gh release download android-latest --pattern 'Exovia-NeuroCanvas-Android.apk*' --dir release-verification
            cmp Exovia-NeuroCanvas-Android.apk release-verification/Exovia-NeuroCanvas-Android.apk
            (cd release-verification && sha256sum --check Exovia-NeuroCanvas-Android.apk.sha256)
            echo 'Published assets downloaded and verified successfully.'
          } 2>&1 | tee -a android-build.log

      - name: Record verified release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          apk_sha="$(awk '{print $1}' Exovia-NeuroCanvas-Android.apk.sha256)"
          apk_size="$(stat -c '%s' Exovia-NeuroCanvas-Android.apk)"
          release_commit="$(git rev-list -n 1 android-latest)"
          verified_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git fetch origin main
          git rebase origin/main
          mkdir -p release-metadata
          cp Exovia-NeuroCanvas-Android.apk.sha256 release-metadata/Exovia-NeuroCanvas-Android.apk.sha256
          cat > release-metadata/android-latest.json <<EOF
          {
            "tag": "android-latest",
            "asset": "Exovia-NeuroCanvas-Android.apk",
            "assetUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/download/android-latest/Exovia-NeuroCanvas-Android.apk",
            "checksumUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/download/android-latest/Exovia-NeuroCanvas-Android.apk.sha256",
            "sha256": "$apk_sha",
            "sizeBytes": $apk_size,
            "sourceCommit": "$GITHUB_SHA",
            "releaseCommit": "$release_commit",
            "workflowRun": "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID",
            "verified": true,
            "verification": "Published assets were downloaded again, byte-compared and checked with SHA-256.",
            "verifiedAt": "$verified_at"
          }
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release-metadata/android-latest.json release-metadata/Exovia-NeuroCanvas-Android.apk.sha256
          if ! git diff --cached --quiet; then
            git commit -m 'release: record verified Android APK [skip ci]'
            git push origin HEAD:main
          fi

      - name: Close automatic failure report
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue="$(gh issue list --state open --search '"[Android Build] Automatic failure report" in:title' --json number --jq '.[0].number' 2>/dev/null || true)"
          if [[ -n "$issue" && "$issue" != "null" ]]; then gh issue close "$issue" --comment "Android APK build completed successfully in $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID."; fi

      - name: Publish automatic failure report
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          {
            echo '## Android APK build failed'; echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"; echo
            echo '### Step outcomes'
            echo "- Install: ${{ steps.install.outcome }}"
            echo "- Lockfile: ${{ steps.lockfile.outcome }}"
            echo "- Web verification: ${{ steps.verify.outcome }}"
            echo "- Web assets: ${{ steps.web_assets.outcome }}"
            echo "- Capacitor and branding: ${{ steps.capacitor.outcome }}"
            echo "- Gradle: ${{ steps.gradle.outcome }}"
            echo "- APK preparation: ${{ steps.prepare.outcome }}"
            echo "- Artifact upload: ${{ steps.artifact.outcome }}"
            echo "- Release publication: ${{ steps.release.outcome }}"
            echo "- Release metadata: ${{ steps.metadata.outcome }}"; echo
            echo '### Last diagnostic lines'; echo '```text'
            if [[ -f android-build.log ]]; then tail -n 180 android-build.log | sed -r 's/\x1B\[[0-9;]*[mK]//g'; else echo 'No diagnostic log was created.'; fi
            echo '```'
          } > android-failure.md
          issue="$(gh issue list --state open --search '"[Android Build] Automatic failure report" in:title' --json number --jq '.[0].number' 2>/dev/null || true)"
          if [[ -n "$issue" && "$issue" != "null" ]]; then gh issue edit "$issue" --body-file android-failure.md; else gh issue create --title '[Android Build] Automatic failure report' --body-file android-failure.md; fi
