name: Verify NeuroCanvas

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package.json
      - name: Verify backend
        run: npm run verify

  frontend-static:
    name: Frontend integration checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          for file in src/*.js scripts/*.mjs sw.js; do
            echo "Checking $file"
            node --check "$file"
          done
      - name: Verify frontend integration
        run: node scripts/verify-frontend.mjs
