name: Verify NeuroCanvas

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify backend
        run: npm run verify

  frontend-static:
    name: Frontend and readiness checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          for file in src/*.js scripts/*.mjs sw.js; do
            echo "Checking $file"
            node --check "$file"
          done
      - name: Run judge and user preflight
        run: npm run doctor
      - name: Validate product structure
        run: npm run validate
      - name: Run root tests
        run: npm test
      - name: Verify frontend integration
        run: npm run verify:static
      - name: Generate release readiness evidence
        run: npm run readiness
      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness
          path: artifacts/release-readiness.json
          if-no-files-found: warn
          retention-days: 14

  browser-smoke:
    name: Browser smoke — ${{ matrix.label }} ${{ matrix.shard_label }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: desktop-chromium
            label: desktop
            shard: 1/2
            shard_label: 1-of-2
          - project: desktop-chromium
            label: desktop
            shard: 2/2
            shard_label: 2-of-2
          - project: mobile-chromium
            label: mobile
            shard: 1/2
            shard_label: 1-of-2
          - project: mobile-chromium
            label: mobile
            shard: 2/2
            shard_label: 2-of-2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run ${{ matrix.label }} browser tests — ${{ matrix.shard_label }}
        run: npm run test:e2e -- --project=${{ matrix.project }} --shard=${{ matrix.shard }}
      - name: Upload ${{ matrix.label }} browser diagnostics — ${{ matrix.shard_label }}
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ matrix.label }}-${{ matrix.shard_label }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
