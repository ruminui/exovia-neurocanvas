name: Verify NeuroCanvas

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package.json
      - name: Verify backend
        run: npm run verify

  frontend-static:
    name: Frontend static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          for file in src/*.js; do
            echo "Checking $file"
            node --check "$file"
          done
      - name: Validate required production assets
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f manifest.webmanifest
          test -f sw.js
          test -f src/core.js
          test -f src/product.js
          test -f src/mobile.js
          test -f src/brain.js
          test -f src/ai-bridge.js
          grep -q 'src/core.js' index.html
          grep -q 'src/product.js' index.html
          grep -q 'src/mobile.js' index.html
          grep -q 'src/brain.js' index.html
          grep -q 'src/ai-bridge.js' index.html
