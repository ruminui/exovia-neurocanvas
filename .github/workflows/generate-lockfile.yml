name: Generate and commit Node 24 lockfile

on:
  push:
    branches: [main]
    paths:
      - package.json
      - .github/workflows/generate-lockfile.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: node24-lockfile
  cancel-in-progress: true

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package.json
      - name: Generate authentic npm lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Validate lockfile
        shell: bash
        run: |
          set -euo pipefail
          test -s package-lock.json
          node -e "const p=require('./package-lock.json'); if(!p.lockfileVersion) process.exit(1); console.log('lockfileVersion', p.lockfileVersion)"
      - name: Commit lockfile when changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- package-lock.json && git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            echo "package-lock.json is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "build: generate authentic Node 24 package lock"
          git push origin HEAD:main
      - name: Upload lockfile evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node24-package-lock
          path: package-lock.json
          if-no-files-found: error
          retention-days: 30
