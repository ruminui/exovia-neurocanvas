name: Validate ChatGPT App

on:
  push:
    branches: [main]
    paths:
      - 'chatgpt-app/**'
      - '.github/workflows/chatgpt-app.yml'
  pull_request:
    paths:
      - 'chatgpt-app/**'
      - '.github/workflows/chatgpt-app.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-chatgpt-app:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: chatgpt-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax and unit tests
        run: npm run verify

      - name: MCP runtime sanity
        shell: bash
        run: |
          set -euo pipefail
          node src/server.mjs > /tmp/exovia-chatgpt-app.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          sleep 2
          curl --fail --silent --show-error http://127.0.0.1:8787/health
          curl --fail --silent --show-error \
            -X POST http://127.0.0.1:8787/mcp \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"github-actions","version":"1.0.0"}}}' \
            | grep 'exovia-neurocanvas'
          cat /tmp/exovia-chatgpt-app.log
