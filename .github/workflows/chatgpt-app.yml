name: Validate ChatGPT App

on:
  push:
    branches: [main]
    paths:
      - 'chatgpt-app/**'
      - '.devcontainer/**'
      - 'JUDGE_START_HERE.md'
      - '.github/workflows/chatgpt-app.yml'
  pull_request:
    paths:
      - 'chatgpt-app/**'
      - '.devcontainer/**'
      - 'JUDGE_START_HERE.md'
      - '.github/workflows/chatgpt-app.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-chatgpt-app:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: chatgpt-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax unit and submission tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-output
          npm run verify 2>&1 | tee ci-output/verify.log

      - name: Complete hackathon judge flow
        shell: bash
        run: |
          set -o pipefail
          npm run judge 2>&1 | tee ci-output/judge.log

      - name: Upload judge and diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exovia-chatgpt-app-judge-evidence
          path: |
            chatgpt-app/judge-output
            chatgpt-app/ci-output
          if-no-files-found: error
          retention-days: 30

      - name: Build hardened container
        shell: bash
        run: |
          set -o pipefail
          docker build --tag exovia-prooflayer:ci . 2>&1 | tee ci-output/docker-build.log

      - name: Container runtime sanity
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --rm --name exovia-prooflayer-ci --publish 8798:8787 exovia-prooflayer:ci
          trap 'docker logs exovia-prooflayer-ci > ci-output/docker-runtime.log 2>&1 || true; docker stop exovia-prooflayer-ci >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8798/health | tee ci-output/container-health.json; then
              exit 0
            fi
            sleep 1
          done
          docker logs exovia-prooflayer-ci
          exit 1
