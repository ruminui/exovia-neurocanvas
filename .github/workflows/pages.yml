name: Deploy NeuroCanvas to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies reproducibly when lock exists
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci --no-audit --no-fund
          else
            echo "package-lock.json is missing; using npm install for this verification run only."
            npm install --no-audit --no-fund
          fi
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify frontend and browser journeys
        run: npm run verify
      - name: Verify backend
        working-directory: server
        run: npm run verify
      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pages-verification-evidence
          path: |
            artifacts
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static application
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
